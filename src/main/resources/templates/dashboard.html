<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HopPay Dashboard</title>
    <style>
        :root {
            --bg: #f8f5ef;
            --ink: #1b1b1b;
            --muted: #5b5349;
            --brand: #c46b1b;
            --brand-dark: #7a3f10;
            --card: #fff7eb;
            --accent: #e7c28d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at top left, #fdf3df, var(--bg));
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px 64px;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .title {
            font-size: 42px;
            letter-spacing: -1px;
            margin: 0;
        }

        .subtitle {
            color: var(--muted);
            max-width: 640px;
            margin: 0;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(26, 18, 11, 0.08);
        }

        .card h2 {
            margin: 0 0 8px;
            font-size: 18px;
            color: var(--muted);
        }

        .card .value {
            font-size: 28px;
            font-weight: 600;
            color: var(--brand-dark);
        }

        .table-wrap {
            background: #ffffff;
            border-radius: 22px;
            padding: 24px;
            border: 1px solid #ead4b8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid #f0e3d1;
        }

        th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .status {
            font-weight: 600;
            color: var(--brand);
        }

        @media (max-width: 700px) {
            .title {
                font-size: 32px;
            }

            .table-wrap {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <h1 class="title">HopPay Dashboard</h1>

        <section class="metrics">
            <div class="card">
                <h2>Total Transactions</h2>
                <div class="value" th:text="${totalTransactions}">0</div>
            </div>
            <div class="card">
                <h2>Total Volume</h2>
                <div class="value" th:text="${totalVolume}">0</div>
            </div>
        </section>

        <section class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Sender</th>
                        <th>Receiver</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tx : ${transactions}">
                        <td th:text="${tx.sender}">sender</td>
                        <td th:text="${tx.receiver}">receiver</td>
                        <td th:text="${tx.amount}">0</td>
                        <td class="status" th:text="${tx.status}">SETTLED</td>
                        <td th:text="${tx.timestamp}">now</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
